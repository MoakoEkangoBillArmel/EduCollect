<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCollect - {% block title %}Accueil{% endblock %}</title>
    <!-- Bootstrap 5 (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Feuille de style personnalisée (directement dans la page) -->
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #18bc9c;
            --light-bg: #ecf0f1;
        }
        body {
            background-color: var(--light-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background: linear-gradient(135deg, var(--primary), #34495e);
        }
        .navbar-custom .navbar-brand {
            font-weight: bold;
            font-size: 1.8rem;
            color: white !important;
        }
        .navbar-custom .nav-link {
            color: rgba(255,255,255,0.9) !important;
            transition: 0.3s;
        }
        .navbar-custom .nav-link:hover {
            color: var(--accent) !important;
            transform: scale(1.05);
        }
        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .card-custom:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
        .btn-accent {
            background-color: var(--accent);
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 25px;
            border-radius: 30px;
            transition: 0.3s;
        }
        .btn-accent:hover {
            background-color: #16a085;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(24,188,156,0.4);
        }
        footer {
            background-color: var(--primary);
            color: white;
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-graduation-cap me-2"></i>EduCollect
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}"><i class="fas fa-plus-circle me-1"></i> Nouvelle collecte</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dashboard') }}"><i class="fas fa-chart-pie me-1"></i> Tableau de bord</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('map_view') }}"><i class="fas fa-map-marked-alt me-1"></i> Carte</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenu principal -->
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container">
            <small>© 2026 EduCollect – Projet de collecte pour le développement rural | Université de Yaoundé 1</small>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle (avec Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
